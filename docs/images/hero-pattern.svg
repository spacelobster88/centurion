<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Subtle glow for nodes -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <!-- Fade edges to blend with background -->
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="8%" y2="0%">
      <stop offset="0%" stop-color="#141414" stop-opacity="1"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="92%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0%" y1="0%" x2="0%" y2="8%">
      <stop offset="0%" stop-color="#141414" stop-opacity="1"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="92%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#141414"/>

  <!-- Connection lines - subtle network pathways -->
  <g stroke="#2a2a2c" stroke-width="1" fill="none" opacity="0.6">
    <!-- Primary pathways -->
    <line x1="180" y1="120" x2="420" y2="200"/>
    <line x1="420" y1="200" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="900" y2="280"/>
    <line x1="900" y1="280" x2="1050" y2="220"/>
    <line x1="420" y1="200" x2="520" y2="380"/>
    <line x1="520" y1="380" x2="780" y2="420"/>
    <line x1="780" y1="420" x2="900" y2="280"/>
    <line x1="680" y1="160" x2="780" y2="420"/>
    <line x1="180" y1="120" x2="260" y2="340"/>
    <line x1="260" y1="340" x2="520" y2="380"/>
    <line x1="1050" y1="220" x2="1080" y2="440"/>
    <line x1="1080" y1="440" x2="780" y2="420"/>
  </g>

  <!-- Accent pathways - warm terracotta, very subtle -->
  <g stroke="#d97757" stroke-width="1" fill="none" opacity="0.2">
    <line x1="420" y1="200" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="900" y2="280"/>
    <line x1="520" y1="380" x2="780" y2="420"/>
  </g>

  <!-- Secondary connection lines - even more subtle -->
  <g stroke="#2a2a2c" stroke-width="0.5" fill="none" opacity="0.3">
    <line x1="100" y1="450" x2="260" y2="340"/>
    <line x1="340" y1="80" x2="420" y2="200"/>
    <line x1="340" y1="80" x2="180" y2="120"/>
    <line x1="600" y1="500" x2="520" y2="380"/>
    <line x1="600" y1="500" x2="780" y2="420"/>
    <line x1="950" y1="100" x2="900" y2="280"/>
    <line x1="950" y1="100" x2="1050" y2="220"/>
    <line x1="1080" y1="440" x2="1100" y2="520"/>
  </g>

  <!-- Node glows -->
  <circle cx="420" cy="200" r="40" fill="url(#nodeGlow)"/>
  <circle cx="680" cy="160" r="50" fill="url(#nodeGlow)"/>
  <circle cx="900" cy="280" r="35" fill="url(#nodeGlow)"/>
  <circle cx="780" cy="420" r="30" fill="url(#nodeGlow)"/>

  <!-- Primary nodes -->
  <g fill="#2a2a2c">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="340" cy="80" r="2"/>
    <circle cx="260" cy="340" r="2.5"/>
    <circle cx="100" cy="450" r="2"/>
    <circle cx="600" cy="500" r="2"/>
    <circle cx="950" cy="100" r="2.5"/>
    <circle cx="1100" cy="520" r="2"/>
  </g>

  <!-- Accent-highlighted nodes -->
  <g fill="#d97757" opacity="0.7">
    <circle cx="420" cy="200" r="4"/>
    <circle cx="680" cy="160" r="5"/>
    <circle cx="900" cy="280" r="3.5"/>
  </g>

  <!-- Secondary nodes -->
  <g fill="#2a2a2c" opacity="0.8">
    <circle cx="520" cy="380" r="3"/>
    <circle cx="780" cy="420" r="3"/>
    <circle cx="1050" cy="220" r="3"/>
    <circle cx="1080" cy="440" r="2.5"/>
  </g>

  <!-- Tiny dot details -->
  <g fill="#2a2a2c" opacity="0.4">
    <circle cx="300" cy="200" r="1.5"/>
    <circle cx="550" cy="280" r="1.5"/>
    <circle cx="750" cy="300" r="1.5"/>
    <circle cx="850" cy="150" r="1.5"/>
    <circle cx="650" cy="350" r="1.5"/>
    <circle cx="350" cy="300" r="1"/>
    <circle cx="480" cy="130" r="1"/>
    <circle cx="830" cy="480" r="1"/>
    <circle cx="150" cy="250" r="1"/>
    <circle cx="1000" cy="380" r="1"/>
  </g>

  <!-- Edge fades to blend with page background -->
  <rect width="1200" height="600" fill="url(#fadeLeft)"/>
  <rect width="1200" height="600" fill="url(#fadeRight)"/>
  <rect width="1200" height="600" fill="url(#fadeTop)"/>
  <rect width="1200" height="600" fill="url(#fadeBottom)"/>
</svg>