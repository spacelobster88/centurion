<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="edgeFadeL" x1="0%" y1="0%" x2="10%" y2="0%">
      <stop offset="0%" stop-color="#141414" stop-opacity="1"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeFadeR" x1="90%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="#141414"/>

  <!-- Horizontal flow lines -->
  <g stroke="#2a2a2c" stroke-width="0.75" fill="none" opacity="0.5">
    <path d="M 0,100 Q 150,80 300,90 T 600,100 T 900,95 T 1200,100"/>
    <path d="M 0,110 Q 200,130 400,115 T 800,105 T 1200,110"/>
  </g>

  <!-- Accent flow line -->
  <path d="M 200,100 Q 400,70 600,95 T 1000,90" stroke="#d97757" stroke-width="0.75" fill="none" opacity="0.2"/>

  <!-- Nodes along the flow -->
  <g fill="#2a2a2c" opacity="0.6">
    <circle cx="150" cy="95" r="2"/>
    <circle cx="300" cy="90" r="2.5"/>
    <circle cx="450" cy="105" r="2"/>
    <circle cx="600" cy="100" r="3"/>
    <circle cx="750" cy="95" r="2"/>
    <circle cx="900" cy="98" r="2.5"/>
    <circle cx="1050" cy="102" r="2"/>
  </g>

  <!-- Accent nodes -->
  <g fill="#d97757" opacity="0.5">
    <circle cx="400" cy="92" r="3"/>
    <circle cx="700" cy="97" r="2.5"/>
  </g>

  <!-- Small connecting branches -->
  <g stroke="#2a2a2c" stroke-width="0.5" fill="none" opacity="0.3">
    <line x1="300" y1="90" x2="280" y2="60"/>
    <line x1="300" y1="90" x2="330" y2="130"/>
    <line x1="600" y1="100" x2="580" y2="65"/>
    <line x1="600" y1="100" x2="630" y2="140"/>
    <line x1="900" y1="98" x2="920" y2="60"/>
    <line x1="900" y1="98" x2="870" y2="140"/>
  </g>

  <!-- Tiny terminal nodes -->
  <g fill="#2a2a2c" opacity="0.3">
    <circle cx="280" cy="60" r="1.5"/>
    <circle cx="330" cy="130" r="1.5"/>
    <circle cx="580" cy="65" r="1.5"/>
    <circle cx="630" cy="140" r="1.5"/>
    <circle cx="920" cy="60" r="1.5"/>
    <circle cx="870" cy="140" r="1.5"/>
  </g>

  <!-- Edge fades -->
  <rect width="1200" height="200" fill="url(#edgeFadeL)"/>
  <rect width="1200" height="200" fill="url(#edgeFadeR)"/>
</svg>