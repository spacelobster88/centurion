<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style>
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        fill: #f0efe8;
      }
      .label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        fill: #8a8a82;
      }
      .title {
        font-size: 14px;
        font-weight: 500;
      }
      .subtitle {
        font-size: 11px;
        fill: #8a8a82;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#141414"/>

  <!-- Layer 1: Your Application -->
  <rect x="280" y="40" width="240" height="64" rx="8" fill="#1c1c1e" stroke="#2a2a2c" stroke-width="1"/>
  <text x="400" y="66" text-anchor="middle" class="label">YOUR APPLICATION</text>
  <text x="400" y="86" text-anchor="middle" class="subtitle">API calls, agent workflows</text>

  <!-- Connector: App to Gateway -->
  <line x1="400" y1="104" x2="400" y2="160" stroke="#2a2a2c" stroke-width="1"/>
  <polygon points="396,156 404,156 400,164" fill="#2a2a2c"/>

  <!-- Layer 2: Centurion Gateway (highlighted) -->
  <rect x="160" y="164" width="480" height="120" rx="8" fill="#1c1c1e" stroke="#d97757" stroke-width="1" opacity="1"/>
  <!-- Subtle accent glow -->
  <rect x="160" y="164" width="480" height="120" rx="8" fill="none" stroke="#d97757" stroke-width="1" opacity="0.3"/>

  <text x="400" y="192" text-anchor="middle" class="label" fill="#d97757">CENTURION GATEWAY</text>

  <!-- Feature boxes inside gateway -->
  <g>
    <rect x="192" y="208" width="120" height="56" rx="4" fill="#141414" stroke="#2a2a2c" stroke-width="1"/>
    <text x="252" y="232" text-anchor="middle" class="subtitle" fill="#f0efe8" font-size="11">Routing</text>
    <text x="252" y="250" text-anchor="middle" class="subtitle" font-size="10">Smart dispatch</text>
  </g>
  <g>
    <rect x="340" y="208" width="120" height="56" rx="4" fill="#141414" stroke="#2a2a2c" stroke-width="1"/>
    <text x="400" y="232" text-anchor="middle" class="subtitle" fill="#f0efe8" font-size="11">Sessions</text>
    <text x="400" y="250" text-anchor="middle" class="subtitle" font-size="10">State management</text>
  </g>
  <g>
    <rect x="488" y="208" width="120" height="56" rx="4" fill="#141414" stroke="#2a2a2c" stroke-width="1"/>
    <text x="548" y="232" text-anchor="middle" class="subtitle" fill="#f0efe8" font-size="11">Observability</text>
    <text x="548" y="250" text-anchor="middle" class="subtitle" font-size="10">Metrics &amp; logs</text>
  </g>

  <!-- Connectors: Gateway to Providers -->
  <line x1="280" y1="284" x2="200" y2="360" stroke="#2a2a2c" stroke-width="1"/>
  <line x1="400" y1="284" x2="400" y2="360" stroke="#2a2a2c" stroke-width="1"/>
  <line x1="520" y1="284" x2="600" y2="360" stroke="#2a2a2c" stroke-width="1"/>

  <polygon points="196,356 204,356 200,364" fill="#2a2a2c"/>
  <polygon points="396,356 404,356 400,364" fill="#2a2a2c"/>
  <polygon points="596,356 604,356 600,364" fill="#2a2a2c"/>

  <!-- Layer 3: Providers -->
  <rect x="120" y="364" width="160" height="64" rx="8" fill="#1c1c1e" stroke="#2a2a2c" stroke-width="1"/>
  <text x="200" y="392" text-anchor="middle" class="title" font-size="13">Anthropic</text>
  <text x="200" y="410" text-anchor="middle" class="subtitle">Claude models</text>

  <rect x="320" y="364" width="160" height="64" rx="8" fill="#1c1c1e" stroke="#2a2a2c" stroke-width="1"/>
  <text x="400" y="392" text-anchor="middle" class="title" font-size="13">OpenAI</text>
  <text x="400" y="410" text-anchor="middle" class="subtitle">GPT models</text>

  <rect x="520" y="364" width="160" height="64" rx="8" fill="#1c1c1e" stroke="#2a2a2c" stroke-width="1"/>
  <text x="600" y="392" text-anchor="middle" class="title" font-size="13">Local</text>
  <text x="600" y="410" text-anchor="middle" class="subtitle">Ollama, vLLM</text>

  <!-- Layer labels on the right -->
  <text x="700" y="76" class="label" font-size="9" fill="#8a8a82" opacity="0.5">LAYER 1</text>
  <text x="700" y="224" class="label" font-size="9" fill="#d97757" opacity="0.4">LAYER 2</text>
  <text x="700" y="400" class="label" font-size="9" fill="#8a8a82" opacity="0.5">LAYER 3</text>
</svg>