name: Bug Report
description: Report a bug in Centurion
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting! Please fill out the form below."
  - type: input
    id: version
    attributes:
      label: Centurion Version
      placeholder: "e.g., 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core Engine (Centurion)
        - Scheduler
        - Legion / Century / Legionary
        - REST API
        - MCP Tools
        - WebSocket / Events (Aquilifer)
        - Auto-scaler (Optio)
        - Hardware Detection
        - CLI / Quickstart
        - Harness Loop Skill
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python:
        - Hardware:
